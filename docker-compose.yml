services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-genforge}
      POSTGRES_USER: ${POSTGRES_USER:-genforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-genforge}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-genforge} -d ${POSTGRES_DB:-genforge}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      GENFORGE_SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-for-local-development}
      GENFORGE_ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      GENFORGE_DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://genforge:genforge@postgres:5432/genforge}
      GENFORGE_REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      GENFORGE_STORAGE_DIR: ${STORAGE_DIR:-/data/genforge/uploads}
      GENFORGE_CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://200.235.143.10:5173}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploaded_data:/data/genforge/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    env_file:
      - .env.example
    environment:
      GENFORGE_SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-for-local-development}
      GENFORGE_ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      GENFORGE_DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://genforge:genforge@postgres:5432/genforge}
      GENFORGE_REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      GENFORGE_STORAGE_DIR: ${STORAGE_DIR:-/data/genforge/uploads}
      GENFORGE_CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://200.235.143.10:5173}
    command: celery -A app.tasks.celery_app worker --loglevel=INFO
    volumes:
      - ./backend:/app
      - uploaded_data:/data/genforge/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  uploaded_data:
